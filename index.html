<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rundown Live</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #fff;
      color: #111;
    }

    h1 {
      color: #cc0000;
      margin-bottom: 8px;
    }

    .brief {
      background: #f5f5f5;
      padding: 18px;
      border-left: 5px solid #cc0000;
      margin-bottom: 24px;
    }

    .brief h2 {
      margin-top: 0;
    }

    .item {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #ddd;
    }

    .title {
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 6px;
    }

    .title a {
      text-decoration: none;
      color: #111;
    }

    .title a:hover {
      text-decoration: underline;
    }

    .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    .summary {
      font-size: 16px;
      line-height: 1.45;
    }
  </style>
</head>

<body>

<h1>Rundown Live</h1>

<div id="brief"></div>
<div id="feed">Loading feed...</div>

<script>
fetch('./feed.json?cache=' + Date.now())
  .then(response => {
    if (!response.ok) {
      throw new Error('Feed file not found or not loading.');
    }
    return response.json();
  })
  .then(data => {
    const briefContainer = document.getElementById('brief');
    const feedContainer = document.getElementById('feed');

    feedContainer.innerHTML = '';

    if (data.brief) {
      briefContainer.innerHTML = `
        <div class="brief">
          <h2>${data.brief.headline || 'Today’s Brief'}</h2>
          <p>${data.brief.body || ''}</p>
        </div>
      `;
    }

    const incidents = data.incidents || [];

    if (!incidents.length) {
      feedContainer.innerHTML = 'No incidents found in feed.';
      return;
    }

    incidents.forEach(item => {
      const firstSource = item.sources && item.sources.length ? item.sources[0].url : '#';

      const div = document.createElement('div');
      div.className = 'item';

      div.innerHTML = `
        <div class="title">
          <a href="${firstSource}" target="_blank" rel="noopener noreferrer">
            ${item.headline || 'Untitled incident'}
          </a>
        </div>
        <div class="meta">
          ${item.method || 'Incident'} | ${item.city || ''} | ${item.date || ''}
        </div>
        <div class="summary">
          ${item.summary || ''}
        </div>
      `;

      feedContainer.appendChild(div);
    });
  })
  .catch(error => {
    document.getElementById('feed').innerHTML =
      'Error loading feed. Check that feed.json exists in the repo root and is valid JSON.';
    console.error(error);
  });
</script>

</body>
</html>
