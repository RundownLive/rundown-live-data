<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Rundown Live Test</title>
</head>
<body>

<h1>Rundown Live Test</h1>
<div id="feed">Loading feed...</div>

<script>
fetch('https://rundownlive.github.io/rundown-live-data/feed.json?cache=' + Date.now())
  .then(response => response.json())
  .then(data => {
    document.getElementById('feed').innerHTML = `
      <pre>${JSON.stringify(data, null, 2)}</pre>
    `;
  })
  .catch(error => {
    document.getElementById('feed').innerHTML = 'ERROR: ' + error.message;
  });
</script>

</body>
</html>
