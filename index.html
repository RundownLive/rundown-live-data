<script>
fetch('https://rundownlive.github.io/rundown-live-data/feed.json?cache=' + Date.now())
  .then(response => response.json())
  .then(data => {
    document.getElementById('feed').innerHTML = `
      <pre>${JSON.stringify(data, null, 2)}</pre>
    `;
  })
  .catch(error => {
    document.getElementById('feed').innerHTML = error.message;
  });
</script>
